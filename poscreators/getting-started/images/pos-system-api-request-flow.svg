<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 720" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13">
  <title>POS System API – End-to-End Request Flow</title>
  <desc>Sequence diagram showing how a POS system interacts with the fiskaltrust.Middleware via the POS System API, and how the Middleware in turn talks to country-specific signing components and the fiskaltrust.Cloud.</desc>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f3a5f"/>
    </marker>
    <marker id="arrAlt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#7a4a00"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="490" y="26" text-anchor="middle" font-size="16" font-weight="600" fill="#1f3a5f">POS System API – End-to-End Request Flow</text>

  <!-- Actor boxes -->
  <g>
    <rect x="40"  y="50" width="200" height="46" rx="6" ry="6" fill="#e8f0fb" stroke="#1f3a5f"/>
    <text x="140" y="72"  text-anchor="middle" font-weight="600" fill="#1f3a5f">POS System</text>
    <text x="140" y="88"  text-anchor="middle" fill="#1f3a5f">(Cash Register)</text>

    <rect x="390" y="50" width="200" height="46" rx="6" ry="6" fill="#e8f0fb" stroke="#1f3a5f"/>
    <text x="490" y="72"  text-anchor="middle" font-weight="600" fill="#1f3a5f">fiskaltrust.Middleware</text>
    <text x="490" y="88"  text-anchor="middle" fill="#1f3a5f">(POS System API)</text>

    <rect x="740" y="50" width="200" height="46" rx="6" ry="6" fill="#fff2dc" stroke="#7a4a00"/>
    <text x="840" y="72"  text-anchor="middle" font-weight="600" fill="#7a4a00">Signing component</text>
    <text x="840" y="88"  text-anchor="middle" fill="#7a4a00">(SCU / TSE / RT / …) &amp; Cloud</text>
  </g>

  <!-- Lifelines -->
  <line x1="140" y1="96" x2="140" y2="690" stroke="#1f3a5f" stroke-dasharray="4 4"/>
  <line x1="490" y1="96" x2="490" y2="690" stroke="#1f3a5f" stroke-dasharray="4 4"/>
  <line x1="840" y1="96" x2="840" y2="690" stroke="#7a4a00" stroke-dasharray="4 4"/>

  <!-- Helper: each step has a request arrow and a response arrow -->

  <!-- /echo -->
  <g>
    <line x1="140" y1="120" x2="486" y2="120" stroke="#1f3a5f" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="313" y="115" text-anchor="middle" fill="#1f3a5f" font-weight="600">/echo  (health check)</text>
    <line x1="490" y1="140" x2="144" y2="140" stroke="#1f3a5f" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arr)"/>
    <text x="313" y="155" text-anchor="middle" fill="#1f3a5f">echo response</text>
  </g>

  <!-- /order -->
  <g>
    <line x1="140" y1="190" x2="486" y2="190" stroke="#1f3a5f" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="313" y="185" text-anchor="middle" fill="#1f3a5f" font-weight="600">/order  (register order data)</text>
    <line x1="490" y1="210" x2="144" y2="210" stroke="#1f3a5f" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arr)"/>
    <text x="313" y="225" text-anchor="middle" fill="#1f3a5f">order state</text>
  </g>

  <!-- /pay -->
  <g>
    <line x1="140" y1="260" x2="486" y2="260" stroke="#1f3a5f" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="313" y="255" text-anchor="middle" fill="#1f3a5f" font-weight="600">/pay  (process payment)</text>
    <line x1="490" y1="280" x2="144" y2="280" stroke="#1f3a5f" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arr)"/>
    <text x="313" y="295" text-anchor="middle" fill="#1f3a5f">payment state</text>
  </g>

  <!-- /sign + signing component -->
  <g>
    <line x1="140" y1="340" x2="486" y2="340" stroke="#1f3a5f" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="313" y="335" text-anchor="middle" fill="#1f3a5f" font-weight="600">/sign  (fiscalize receipt)</text>

    <line x1="494" y1="360" x2="836" y2="360" stroke="#7a4a00" stroke-width="1.5" marker-end="url(#arrAlt)"/>
    <text x="665" y="355" text-anchor="middle" fill="#7a4a00">country-specific signing</text>
    <line x1="840" y1="380" x2="494" y2="380" stroke="#7a4a00" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrAlt)"/>
    <text x="665" y="395" text-anchor="middle" fill="#7a4a00">signature data</text>

    <line x1="490" y1="410" x2="144" y2="410" stroke="#1f3a5f" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arr)"/>
    <text x="313" y="425" text-anchor="middle" fill="#1f3a5f">signed receipt data</text>
  </g>

  <!-- /issue -->
  <g>
    <line x1="140" y1="470" x2="486" y2="470" stroke="#1f3a5f" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="313" y="465" text-anchor="middle" fill="#1f3a5f" font-weight="600">/issue  (generate receipt output)</text>
    <line x1="490" y1="490" x2="144" y2="490" stroke="#1f3a5f" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arr)"/>
    <text x="313" y="505" text-anchor="middle" fill="#1f3a5f">digital / printable receipt</text>
  </g>

  <!-- /journal -->
  <g>
    <line x1="140" y1="555" x2="486" y2="555" stroke="#1f3a5f" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="313" y="550" text-anchor="middle" fill="#1f3a5f" font-weight="600">/journal  (audit / closing exports)</text>

    <line x1="494" y1="575" x2="836" y2="575" stroke="#7a4a00" stroke-width="1.5" marker-end="url(#arrAlt)"/>
    <text x="665" y="570" text-anchor="middle" fill="#7a4a00">upload receipt chain</text>
    <line x1="840" y1="595" x2="494" y2="595" stroke="#7a4a00" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrAlt)"/>
    <text x="665" y="610" text-anchor="middle" fill="#7a4a00">configuration / updates</text>

    <line x1="490" y1="625" x2="144" y2="625" stroke="#1f3a5f" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arr)"/>
    <text x="313" y="640" text-anchor="middle" fill="#1f3a5f">journal data</text>
  </g>

  <!-- Footer note -->
  <text x="490" y="680" text-anchor="middle" fill="#444" font-style="italic">
    Every request carries x-cashbox-id, x-cashbox-accesstoken, x-possystem-id and x-operation-id — safe to retry without duplicating fiscal actions.
  </text>
</svg>
